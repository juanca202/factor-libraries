@for (star of stars; track star.value) {
  @if (!readOnly()) {
    <button 
      type="button" 
      class="ft-rating__item" 
      [disabled]="disabled()" 
      (mouseover)="setRate(star.value, true)"
      (focus)="setRate(star.value, true)" 
      (blur)="clearHover()" 
      (mouseout)="clearHover()"
      (click)="setRate(star.value)">
      <svg 
        [class]="iconClasses()(star.value)"
        viewBox="0 0 24 24"
        aria-hidden="true">
        <path
          d="M17.93 21.315c-.534.408-5.22-3.186-5.881-3.181-.663 0-5.307 3.656-5.846 3.254-.537-.403 1.29-6.165 1.081-6.822-.209-.656-4.972-4.138-4.772-4.796.201-.658 6.015-.627 6.55-1.036.533-.41 2.233-6.215 2.895-6.219.663 0 2.43 5.779 2.968 6.182.539.403 6.352.297 6.56.953.21.656-4.513 4.197-4.714 4.856-.2.658 1.692 6.398 1.159 6.808z" />
      </svg>
    </button>
  } @else {
    <svg 
      [class]="iconClasses()(star.value)"
      viewBox="0 0 24 24"
      aria-hidden="true">
      <path
        d="M17.93 21.315c-.534.408-5.22-3.186-5.881-3.181-.663 0-5.307 3.656-5.846 3.254-.537-.403 1.29-6.165 1.081-6.822-.209-.656-4.972-4.138-4.772-4.796.201-.658 6.015-.627 6.55-1.036.533-.41 2.233-6.215 2.895-6.219.663 0 2.43 5.779 2.968 6.182.539.403 6.352.297 6.56.953.21.656-4.513 4.197-4.714 4.856-.2.658 1.692 6.398 1.159 6.808z" />
    </svg>
  }
}
