<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid">
    <circle class="ft-track" cx="50" cy="50" r="40" />
    <circle class="ft-bar" 
        [class.ft-bar--determinate]="mode() === 'determinate'"
        [class.ft-bar--indeterminate]="mode() === 'indeterminate'"
        cx="50" cy="50" r="40"
        [style.stroke-dashoffset]="mode() === 'determinate' ? 'calc((3.14159265 * 40 * 2 * (100 - ' + value() + ')) / 100)' : null">
    </circle>
</svg>
